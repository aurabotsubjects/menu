<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurabot — Learning Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@500;600;700;800&family=Yuyu+Short&display=swap" rel="stylesheet">
<style>
  :root{
    --bush-deep:#0f2a21;
    --bush:#1a4636;
    --bush-light:#2e6b52;
    --kowhai:#ffc93c;
    --pohutukawa:#d9603f;
    --tide:#2ea9a0;
    --dusk:#5b4b93;
    --sand:#fbf4e4;
    --sand-dim:#f0e6cf;
    --ink:#12261e;
    --paper:#fffdf7;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    font-family:'Manrope',sans-serif;
    color:var(--ink);
    position:relative;
    overflow-x:hidden;
    background:var(--bush-deep);
  }

  h1,h2,h3{
    font-family:'Space Grotesk',sans-serif;
    letter-spacing:-.01em;
  }
  .brand{
    font-family:'Fredoka',sans-serif;
  }

  /* ---------- ANIMATED SKY ---------- */
  .sky{
    position:fixed;
    inset:0;
    z-index:0;
    background:linear-gradient(180deg,
      var(--dusk) 0%,
      #3f6f8f 28%,
      var(--tide) 58%,
      #e08a3e 82%,
      var(--kowhai) 100%);
    background-size:100% 220%;
    animation:driftSky 40s ease-in-out infinite alternate;
  }
  @keyframes driftSky{
    0%{background-position:0 0%;}
    100%{background-position:0 100%;}
  }

  .sky-night{
    position:fixed;
    inset:0;
    z-index:0;
    background:linear-gradient(180deg,
      #050813 0%,
      #0b1230 26%,
      #131a3a 52%,
      #1c2740 76%,
      var(--bush-deep) 100%);
    opacity:0;
    animation:nightCycle 100s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes nightCycle{
    0%{opacity:0;}
    45%{opacity:0;}
    62%{opacity:1;}
    85%{opacity:1;}
    100%{opacity:0;}
  }

  .stars{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    opacity:0;
    animation:nightCycle 100s ease-in-out infinite;
  }
  .star{
    position:absolute;
    background:#fdfaf0;
    border-radius:50%;
    animation:twinkle ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.15;}
    50%{opacity:1;}
  }

  .crux{
    position:absolute;
    top:8vh;
    right:6vw;
    width:220px;
    height:150px;
  }
  .crux svg{display:block; width:100%; height:100%; overflow:visible;}
  .crux-star{fill:#ffe6b0; animation:twinkle ease-in-out infinite;}


  .glow-horizon{
    position:fixed;
    left:0; right:0; bottom:0;
    height:40vh;
    background:radial-gradient(ellipse at 50% 100%, rgba(255,201,60,.45), transparent 70%);
    z-index:1;
    pointer-events:none;
    animation:dayGlow 100s ease-in-out infinite;
  }
  @keyframes dayGlow{
    0%{opacity:1;}
    45%{opacity:1;}
    62%{opacity:.12;}
    85%{opacity:.12;}
    100%{opacity:1;}
  }

  .clouds{position:fixed; inset:0; z-index:1; pointer-events:none;}
  .cloud{
    position:absolute;
    background:rgba(255,255,255,.18);
    border-radius:50%;
    filter:blur(1px);
    animation:floatCloud linear infinite;
  }
  @keyframes floatCloud{
    from{transform:translateX(-20vw);}
    to{transform:translateX(120vw);}
  }

  /* ---------- BIRDS ---------- */
  .birds{position:fixed; inset:0; z-index:2; pointer-events:none;}
  .bird{
    position:absolute;
    width:34px; height:16px;
    opacity:.55;
    animation-name:flyAcross, bob;
    animation-timing-function:linear, ease-in-out;
    animation-iteration-count:infinite, infinite;
  }
  .bird svg{width:100%;height:100%;fill:var(--bush-deep);}
  @keyframes flyAcross{
    from{transform:translateX(-10vw);}
    to{transform:translateX(110vw);}
  }
  @keyframes bob{
    0%,100%{margin-top:0;}
    50%{margin-top:14px;}
  }

  /* ---------- FERNS ---------- */
  .ferns{
    position:fixed; left:0; right:0; bottom:-6px;
    height:22vh; z-index:3; pointer-events:none;
    display:flex; align-items:flex-end; justify-content:space-around;
  }
  .fern{
    transform-origin:bottom center;
    animation:sway 6s ease-in-out infinite;
    opacity:.85;
  }
  .fern svg{display:block; filter:drop-shadow(0 6px 6px rgba(0,0,0,.25));}
  @keyframes sway{
    0%,100%{transform:rotate(-4deg);}
    50%{transform:rotate(4deg);}
  }

  /* ---------- LAYOUT ---------- */
  .wrap{
    position:relative;
    z-index:5;
    max-width:1100px;
    margin:0 auto;
    padding:56px 36px 80px;
  }

  header{
    text-align:center;
    margin-bottom:46px;
  }
  .brand{
    font-size:clamp(5.2rem, 12vw, 8.8rem);
    color:var(--paper);
    margin:0;
    letter-spacing:.5px;
    text-shadow:0 6px 24px rgba(0,0,0,.35);
  }
  .brand span{color:var(--kowhai);}
  .brand-sub{
    font-family:'Fredoka',sans-serif;
    font-size:clamp(2.6rem, 6vw, 4.4rem);
    color:var(--paper);
    margin:-14px 0 0;
    letter-spacing:.1em;
    text-transform:uppercase;
    text-shadow:0 6px 24px rgba(0,0,0,.35);
  }
  .clock{
    display:inline-block;
    margin:22px 0 0;
    padding:9px 22px;
    border-radius:999px;
    background:rgba(255,253,247,.16);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.35);
    color:var(--sand);
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:.95rem;
    letter-spacing:.03em;
    text-shadow:0 2px 8px rgba(0,0,0,.3);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
    gap:32px;
  }

  .card{
    position:relative;
    background:rgba(255,253,247,.5);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border-radius:20px 20px 26px 20px;
    padding:14px 18px 12px;
    text-align:left;
    text-decoration:none;
    color:var(--ink);
    box-shadow:0 10px 28px rgba(10,25,20,.28), inset 0 1px 0 rgba(255,255,255,.65), inset 0 0 0 2px rgba(10,20,16,.5);
    border:1px solid rgba(255,255,255,.55);
    transform:translateY(0);
    transition:transform .28s cubic-bezier(.2,.9,.3,1.3), box-shadow .28s ease, border-color .3s ease, background .3s ease;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    gap:6px;
    min-height:80px;
    overflow:hidden;
    isolation:isolate;
  }
  .card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 42%);
    pointer-events:none;
    border-radius:inherit;
  }
  .card-fill{
    position:absolute;
    left:-4%; right:-4%; top:0;
    height:9px;
    background:var(--accent, var(--tide));
    opacity:.88;
    transition:height .45s cubic-bezier(.65,0,.35,1);
    z-index:0;
    border-radius:0 0 60% 60% / 0 0 100% 100%;
  }
  .card:hover .card-fill, .card:focus-visible .card-fill{
    height:112%;
    border-radius:0;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(10,25,20,.45), inset 0 1px 0 rgba(255,255,255,.65), inset 0 0 0 2px rgba(10,20,16,.5);
    border-color:var(--accent, var(--tide));
    outline:none;
  }
  .card h2{
    position:relative;
    z-index:1;
    margin:0;
    font-family:'Yuyu Short','Space Grotesk',sans-serif;
    font-size:2.5rem;
    font-weight:400;
    letter-spacing:.01em;
    line-height:1.1;
    text-align:center;
    color:var(--ink);
    transition:color .3s ease;
  }
  .card p{
    position:relative;
    z-index:1;
    margin:0;
    font-size:.8rem;
    color:#6b6152;
    font-weight:600;
    word-break:break-word;
    transition:color .3s ease;
  }
  .card:hover h2, .card:focus-visible h2{ color:var(--hover-ink, #fffdf7); }
  .card:hover p, .card:focus-visible p{ color:var(--hover-ink, #fffdf7); opacity:.85; }

  .card-arrow{
    position:absolute;
    top:18px; right:20px;
    z-index:1;
    font-size:1rem;
    color:var(--hover-ink, #fffdf7);
    opacity:0;
    transform:translate(-4px,4px);
    transition:opacity .3s ease, transform .3s ease;
  }
  .card:hover .card-arrow, .card:focus-visible .card-arrow{
    opacity:.9;
    transform:translate(0,0);
  }

  /* ---------- Group cards (Writing / Art / Topic) with popup submenus ---------- */
  .card-wrap{
    position:relative;
    display:flex;
  }
  .card-wrap .card{
    flex:1;
  }
  .group-card{cursor:pointer;}
  .group-card[aria-expanded="true"] .card-arrow{
    opacity:.9;
    transform:translate(0,0) rotate(180deg);
  }

  .submenu{
    position:absolute;
    top:calc(100% + 10px);
    left:50%;
    width:88%;
    max-width:260px;
    background:rgba(255,253,247,.94);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:16px;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
    box-shadow:0 14px 30px rgba(10,25,20,.35);
    border:1px solid rgba(255,255,255,.5);
    opacity:0;
    transform:translate(-50%,-6px);
    pointer-events:none;
    transition:opacity .22s ease, transform .22s ease;
    z-index:30;
  }
  .submenu.open{
    opacity:1;
    transform:translate(-50%,0);
    pointer-events:auto;
  }
  .submenu-item{
    display:block;
    padding:12px 14px;
    border-radius:10px;
    background:var(--sand);
    color:var(--ink);
    text-decoration:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    text-align:center;
    transition:background .2s ease, color .2s ease, transform .2s ease;
  }
  .submenu-item:hover, .submenu-item:focus-visible{
    background:var(--bush);
    color:#fffdf7;
    transform:translateY(-2px);
    outline:none;
  }

  /* ---------- Verse of the week card ---------- */
  .verse-card{
    grid-column:1 / -1;
    align-items:flex-start;
    justify-content:flex-start;
    text-align:left;
    cursor:default;
    gap:10px;
    padding:30px 34px;
  }
  .verse-card:hover{
    transform:none;
    box-shadow:0 10px 28px rgba(10,25,20,.28), inset 0 1px 0 rgba(255,255,255,.65), inset 0 0 0 2px rgba(10,20,16,.5);
    border-color:rgba(255,255,255,.55);
  }
  .verse-label{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:.72rem;
    color:var(--pohutukawa);
    position:relative;
    z-index:1;
  }
  .verse-text{
    font-family:'Manrope',sans-serif;
    font-weight:600;
    font-size:2.6rem;
    line-height:1.45;
    color:var(--ink);
    margin:0;
    position:relative;
    z-index:1;
  }
  .verse-ref{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-style:italic;
    color:#6b6152;
    margin:0;
    position:relative;
    z-index:1;
  }

  footer{
    text-align:center;
    margin-top:60px;
    color:var(--sand);
    font-size:.85rem;
    opacity:.7;
  }

  @media (prefers-reduced-motion: reduce){
    .sky, .sky-night, .stars, .star, .crux-star, .glow-horizon, .bird, .cloud, .fern, .card, .submenu{animation:none !important; transition:none !important;}
    .sky-night{opacity:0 !important;}
  }
</style>
</head>
<body>

  <div class="sky"></div>
  <div class="sky-night"></div>
  <div class="stars" id="stars">
    <div class="crux">
      <svg viewBox="0 0 220 150" overflow="visible">
        <!-- Southern Cross (Crux) -->
        <circle class="crux-star" cx="95" cy="10" r="2.6" style="animation-duration:3.4s;"/>   <!-- Gacrux -->
        <circle class="crux-star" cx="108" cy="58" r="3.2" style="animation-duration:2.6s;"/>  <!-- Acrux -->
        <circle class="crux-star" cx="62" cy="28" r="2.4" style="animation-duration:3.1s;"/>   <!-- Mimosa -->
        <circle class="crux-star" cx="132" cy="35" r="2" style="animation-duration:3.8s;"/>    <!-- Delta Crux -->
        <circle class="crux-star" cx="115" cy="45" r="1.4" style="animation-duration:4.2s;"/>  <!-- Epsilon Crux -->
        <!-- Pointer stars, trailing away from Acrux along a realistic sightline -->
        <circle class="crux-star" cx="165" cy="75" r="2.4" style="animation-duration:2.9s;"/>  <!-- Beta Centauri -->
        <circle class="crux-star" cx="195" cy="100" r="3" style="animation-duration:2.5s;"/>   <!-- Alpha Centauri -->
      </svg>
    </div>
    <div id="randomStars"></div>
  </div>
  <div class="glow-horizon"></div>
  <div class="clouds" id="clouds"></div>
  <svg class="birds" id="birds" width="0" height="0" style="position:absolute">
    <defs>
      <symbol id="bird-shape" viewBox="0 0 34 16">
        <path d="M0,12 C6,2 11,2 17,10 C23,2 28,2 34,12 C27,9 22,9 17,13 C12,9 7,9 0,12 Z"/>
      </symbol>
    </defs>
  </svg>
  <div class="ferns" id="ferns"></div>

  <div class="wrap">
    <header>
      <h1 class="brand">Aura<span>bot</span></h1>
      <p class="brand-sub">Project</p>
      <p class="clock" id="clock"></p>
    </header>

    <main class="grid" id="appGrid"></main>

  </div>

<script>
  // ---------- Background decoration: clouds, birds, ferns ----------
  const randomStarsLayer = document.getElementById('randomStars');
  for(let i=0;i<70;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = 1 + Math.random()*2;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = (Math.random()*100)+'vw';
    s.style.top = (Math.random()*65)+'vh';
    s.style.animationDuration = (2 + Math.random()*3)+'s';
    s.style.animationDelay = (-Math.random()*5)+'s';
    randomStarsLayer.appendChild(s);
  }

  const cloudLayer = document.getElementById('clouds');
  for(let i=0;i<6;i++){
    const c = document.createElement('div');
    c.className='cloud';
    const size = 60 + Math.random()*120;
    c.style.width = size+'px';
    c.style.height = size*0.5+'px';
    c.style.top = (5 + Math.random()*40)+'vh';
    c.style.animationDuration = (50 + Math.random()*40)+'s';
    c.style.animationDelay = (-Math.random()*60)+'s';
    cloudLayer.appendChild(c);
  }

  const birdLayer = document.getElementById('birds');
  for(let i=0;i<7;i++){
    const b = document.createElement('div');
    b.className='bird';
    const size = 22 + Math.random()*24;
    b.style.width = size+'px';
    b.style.height = (size*0.47)+'px';
    b.style.top = (8 + Math.random()*45)+'vh';
    b.style.animationDuration = (18 + Math.random()*22)+'s, ' + (2+Math.random()*2)+'s';
    b.style.animationDelay = (-Math.random()*30)+'s, ' + (-Math.random()*3)+'s';
    b.innerHTML = '<svg viewBox="0 0 34 16"><use href="#bird-shape"/></svg>';
    birdLayer.appendChild(b);
  }

  const fernLayer = document.getElementById('ferns');
  const fernColors = ['#0f2a21','#16342b','#1a4636'];
  for(let i=0;i<9;i++){
    const f = document.createElement('div');
    f.className='fern';
    const h = 60 + Math.random()*90;
    const col = fernColors[i % fernColors.length];
    f.style.animationDuration = (5 + Math.random()*3)+'s';
    f.style.animationDelay = (-Math.random()*5)+'s';
    f.innerHTML = `<svg width="${h*0.5}" height="${h}" viewBox="0 0 40 100">
      <path d="M20,100 C18,60 22,40 20,0 C30,25 34,45 26,60 C34,55 38,70 28,78 C34,80 34,92 24,92 C30,95 24,100 20,100 Z" fill="${col}"/>
    </svg>`;
    fernLayer.appendChild(f);
  }

  // ---------- App menu ----------
  // To add a plain link: {type:'link', name:'...', url:'...', accent:'...'}
  // To add a group with a popup (like Writing/Art/Topic): {type:'group', name:'...', accent:'...', options:[{name:'...', url:'...'}, ...]}
  // Accent colors used elsewhere on the page: #2ea9a0 teal, #d9603f ember,
  // #5b4b93 purple, #e08a3e orange, #ffc93c yellow, #2e6b52 bush green.
  const MENU = [
    {type:'link', name:'Reading', url:'https://aurabotsubjects.github.io/reading/', accent:'#2ea9a0'},
    {type:'group', name:'Writing', accent:'#d9603f', options:[
      {name:'Writing 3–4', url:'https://aurabotsubjects.github.io/writing3_4/'},
      {name:'Writing 5–6', url:'https://aurabotsubjects.github.io/writing/'},
    ]},
    {type:'link', name:'Te Reo', url:'https://aurabotsubjects.github.io/te-reo/', accent:'#ffc93c'},
    {type:'group', name:'Art', accent:'#2e6b52', options:[
      {name:'Māori Art', url:'https://aurabotsubjects.github.io/maori-art/'},
      {name:'Art Elements', url:'https://aurabotsubjects.github.io/art-elements/'},
    ]},
    {type:'group', name:'Topic', accent:'#5b4b93', options:[
      {name:'Wayfinder', url:'https://aurabotsubjects.github.io/wayfinder/'},
      // add more topics here, e.g. {name:'Next Topic', url:'https://...'},
    ]},
  ];

  const grid = document.getElementById('appGrid');

  function contrastInk(hex){
    if(!hex) return '#fffdf7';
    const h = hex.replace('#','');
    const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    return luminance > 0.62 ? '#12261e' : '#fffdf7';
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function closeAllSubmenus(except){
    document.querySelectorAll('.submenu.open').forEach(el => {
      if(el !== except) el.classList.remove('open');
    });
    document.querySelectorAll('.group-card[aria-expanded="true"]').forEach(el => {
      if(!except || el !== except.previousElementSibling) el.setAttribute('aria-expanded','false');
    });
  }

  function makeCard(item){
    const a = document.createElement('a');
    a.className = 'card';
    a.href = item.url;
    const accent = item.accent || '#2ea9a0';
    a.style.setProperty('--accent', accent);
    a.style.setProperty('--hover-ink', contrastInk(accent));
    a.innerHTML = `
      <div class="card-fill"></div>
      <span class="card-arrow">↗</span>
      <h2>${escapeHtml(item.name)}</h2>
    `;
    return a;
  }

  function makeGroupCard(item){
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    const card = document.createElement('div');
    card.className = 'card group-card';
    card.tabIndex = 0;
    card.setAttribute('role','button');
    card.setAttribute('aria-haspopup','true');
    card.setAttribute('aria-expanded','false');
    const accent = item.accent || '#2ea9a0';
    card.style.setProperty('--accent', accent);
    card.style.setProperty('--hover-ink', contrastInk(accent));
    card.innerHTML = `
      <div class="card-fill"></div>
      <span class="card-arrow">⌄</span>
      <h2>${escapeHtml(item.name)}</h2>
    `;

    const submenu = document.createElement('div');
    submenu.className = 'submenu';
    item.options.forEach(opt => {
      const a = document.createElement('a');
      a.className = 'submenu-item';
      a.href = opt.url;
      a.textContent = opt.name;
      submenu.appendChild(a);
    });

    function toggle(e){
      e.preventDefault();
      const willOpen = !submenu.classList.contains('open');
      closeAllSubmenus(willOpen ? submenu : null);
      submenu.classList.toggle('open', willOpen);
      card.setAttribute('aria-expanded', String(willOpen));
    }
    card.addEventListener('click', toggle);
    card.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' ') toggle(e);
      if(e.key === 'Escape'){ submenu.classList.remove('open'); card.setAttribute('aria-expanded','false'); }
    });

    wrap.appendChild(card);
    wrap.appendChild(submenu);
    return wrap;
  }

  document.addEventListener('click', (e) => {
    if(!e.target.closest('.card-wrap')) closeAllSubmenus(null);
  });

  MENU.forEach(item => {
    grid.appendChild(item.type === 'group' ? makeGroupCard(item) : makeCard(item));
  });

  // ---------- Verse of the week ----------
  // A local bank of verses that rotates every Monday morning — one shows per
  // week, and it cycles back to the start once it reaches the end. To add
  // more, just add another {ref, text} line below.
  const VERSES = [
    {ref:'Proverbs 3:5-6', text:'Trust in the LORD with all thine heart; and lean not unto thine own understanding. In all thy ways acknowledge him, and he shall direct thy paths.'},
    {ref:'Joshua 1:9', text:'Have not I commanded thee? Be strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest.'},
    {ref:'Philippians 4:13', text:'I can do all things through Christ which strengtheneth me.'},

  function getWeekIndex(){
    const now = new Date();
    const day = now.getDay(); // 0 = Sun ... 6 = Sat
    const daysSinceMonday = (day === 0) ? 6 : day - 1;
    const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysSinceMonday);
    const epochMonday = new Date(1970, 0, 5); // a known Monday
    const weekNumber = Math.floor((monday - epochMonday) / (7 * 86400000));
    return ((weekNumber % VERSES.length) + VERSES.length) % VERSES.length;
  }

  function makeVerseCard(){
    const div = document.createElement('div');
    div.className = 'card verse-card';
    const v = VERSES[getWeekIndex()];
    div.innerHTML = `
      <span class="verse-label">Verse of the week</span>
      <p class="verse-text">“${escapeHtml(v.text)}”</p>
      <p class="verse-ref">${escapeHtml(v.ref)}</p>
    `;
    return div;
  }

  grid.appendChild(makeVerseCard());

  // ---------- Clock ----------
  function updateClock(){
    const el = document.getElementById('clock');
    if(!el) return;
    const now = new Date();
    const dateStr = now.toLocaleDateString(undefined, {weekday:'long', day:'numeric', month:'long'});
    const timeStr = now.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    el.textContent = `${dateStr} · ${timeStr}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
